<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立即加入LINE</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f5;
  text-align: center;
}

/* 主卡片 */
.card {
  background: white;
  margin: 20px;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 圖片 */
.card img {
  width: 100%;
  border-radius: 15px;
}

/* 標題 */
.title {
  font-size: 28px;
  font-weight: bold;
  margin: 20px 0 10px;
}

/* 副標 */
.subtitle {
  color: #666;
  font-size: 16px;
  margin-bottom: 20px;
}

/* 勾勾 */
.check {
  color: #06C755;
  font-size: 16px;
  margin-bottom: 20px;
}

/* 按鈕 */
.btn {
  display: block;
  margin: 20px;
  background: linear-gradient(90deg,#06C755,#00e676);
  color: white;
  padding: 18px;
  border-radius: 40px;
  font-size: 20px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  animation: pulse 1.2s infinite;
}

/* 呼吸效果 */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

</style>
</head>

<body>

<div class="card" id="clickArea">
  <img src="imagesbg.jpg.png">

  <div class="title">雙車電台</div>

  <div class="subtitle">
    ～所有版路皆已整理完成～<br>
    歡迎加入收聽
  </div>

  <div class="check">✔ 連中五期中，LINE同步更新</div>
</div>

<a class="btn" id="btn">
👉 立即加入LINE<br>
觀看最新強勢版路🔥
</a>

<script>
// 🔐 你的LINE
const encoded = "aHR0cHM6Ly9saW4uZWUvWTJHYUhlVA==";
const targetUrl = atob(encoded);

// 👉 點擊整頁
document.getElementById("clickArea").onclick = function() {
  window.open(targetUrl, "_blank");
};

// 👉 按鈕
document.getElementById("btn").onclick = function() {
  window.open(targetUrl, "_blank");
};

// 🔥 防返回（強版）
history.pushState(null, null, location.href);
window.onpopstate = function () {
  history.pushState(null, null, location.href);
};

</script>

</body>
</html>

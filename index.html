<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立即加入LINE</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
}

.wrapper {
  position: relative;
}

img {
  width: 100%;
  display: block;
}

/* 底部提示 */
.tip {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 18px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* 固定按鈕 */
.fixed-btn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(90deg,#06C755,#00e676);
  color: #fff;
  padding: 16px 20px;
  border-radius: 30px;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  width: 85%;
  max-width: 420px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  animation: pulse 1.2s infinite;
  overflow: hidden;
}

.fixed-btn span:nth-child(2) {
  font-size: 22px;
  color: #ffeb3b;
}

/* 閃光掃描效果 */
.fixed-btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.4);
  transform: skewX(-20deg);
  animation: shine 2s infinite;
}

@keyframes shine {
  0% { left: -100%; }
  100% { left: 150%; }
}

@keyframes pulse {
  0% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.08); }
  100% { transform: translateX(-50%) scale(1); }
}

@keyframes pulse {
  0% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.05); }
  100% { transform: translateX(-50%) scale(1); }
}

</style>
</head>

<body>

<div class="wrapper" id="clickArea">
  <img src="你的圖片.jpg">
  <div class="tip">👇 點擊畫面立即加入LINE 👇</div>
</div>

<div class="fixed-btn" id="btn">🔥點擊觀看<br>🔥今彩539<br>🔥強勢版路</div>

<script>
// 🔐 Base64隱藏LINE
const encoded = "aHR0cHM6Ly9saW4uZWUvbmxvVWFVSg=="; // 換你的
const targetUrl = atob(encoded);

// 👉 任意點擊跳轉
document.getElementById("clickArea").addEventListener("click", function() {
  window.location.href = targetUrl;
});

// 👉 按鈕點擊跳轉
document.getElementById("btn").addEventListener("click", function(e) {
  e.stopPropagation();
  window.location.href = targetUrl;
});

</script>

</body>
</html>

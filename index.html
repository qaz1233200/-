<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立即加入LINE</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 背景 */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://raw.githubusercontent.com/qaz1233200/-/main/imagesbg.jpg.png") no-repeat center;
  background-size: cover;
  filter: brightness(0.6);
}

/* 遮罩 */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.2));
}

/* 內容 */
.content {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  color: #fff;
}

/* 標題 */
.title {
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* 提示 */
.tip {
  position: fixed;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 16px;
  animation: blink 1.2s infinite;
}

@keyframes blink {
  50% { opacity: 0.4; }
}

/* 按鈕 */
.btn {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 420px;

  padding: 18px;
  border-radius: 40px;

  background: linear-gradient(135deg,#06C755,#00e676);
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transition: 0.2s;
}

.btn:active {
  transform: translateX(-50%) scale(0.95);
}

/* 小字 */
.small {
  font-size: 14px;
  color: #ffeb3b;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content" id="clickArea">
  <div class="title">機會只給準備好的人</div>
</div>

<div class="tip">👇 點擊任意位置立即加入 👇</div>

<div class="btn" id="btn">
  🚀 立即加入LINE
  <div class="small">觀看最新強勢版路🔥</div>
</div>

<script>
// ==========================
// 👉 LINE連結
// ==========================
const targetUrl = "https://lin.ee/Y8GaHeT";


// ==========================
// 🔥 防返回（強化版）
// ==========================
(function () {
    // 初始化
    history.replaceState(null, null, location.href);

    // 疊兩層（更穩）
    history.pushState(null, null, location.href);

    window.addEventListener("popstate", function () {
        history.pushState(null, null, location.href);
    });
})();


// ==========================
// 👉 跳轉函式（新分頁）
// ==========================
function goLine() {
    window.open(targetUrl, '_blank', 'noopener,noreferrer');
}


// ==========================
// 👉 點擊事件
// ==========================
document.getElementById("clickArea").onclick = goLine;

document.getElementById("btn").onclick = function(e){
    e.stopPropagation();
    goLine();
};
</script>

</body>
</html>

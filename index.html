<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立即加入LINE</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 背景 */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://raw.githubusercontent.com/qaz1233200/-/main/imagesbg.jpg.png") no-repeat center;
  background-size: cover;
  filter: brightness(0.6);
}

/* 漸層遮罩 */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
}

/* 主內容 */
.content {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  color: #fff;
  padding: 20px;
}

/* 主標題 */
.title {
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 0 15px rgba(0,0,0,0.8);
}

/* 副標 */
.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: #ffeb3b;
}

/* 按鈕 */
.btn {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 420px;

  padding: 18px;
  border-radius: 50px;

  background: linear-gradient(135deg,#06C755,#00e676);
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.6);

  transition: 0.2s;
}

.btn:active {
  transform: translateX(-50%) scale(0.95);
}

/* 小字 */
.small {
  font-size: 14px;
  color: #ffeb3b;
  margin-top: 5px;
}

/* 提示 */
.tip {
  position: fixed;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 16px;
  animation: blink 1.2s infinite;
}

@keyframes blink {
  50% { opacity: 0.4; }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content" id="clickArea">
  <div class="title">機會只給準備好的人</div>
  <div class="subtitle">現在就是翻身的機會 🔥</div>
</div>

<div class="tip">👇 點擊任意位置立即加入 👇</div>

<div class="btn" id="btn">
  🚀 立即加入LINE
  <div class="small">免費領取獨家資訊</div>
</div>

<script>
const targetUrl = "https://lin.ee/Y8GaHeT";

// 全畫面點擊
document.getElementById("clickArea").onclick = () => {
  window.location.href = targetUrl;
};

// 按鈕點擊
document.getElementById("btn").onclick = (e) => {
  e.stopPropagation();
  window.location.href = targetUrl;
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立即查看</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f5;
  text-align: center;
}

.card {
  background: white;
  margin: 20px;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 15px;
}

.title {
  font-size: 26px;
  font-weight: bold;
  margin: 20px 0 10px;
}

.subtitle {
  color: #666;
  font-size: 16px;
  margin-bottom: 20px;
  line-height: 1.5;
}

.check {
  color: #06C755;
  font-size: 16px;
  margin-bottom: 20px;
}

.btn {
  display: block;
  margin: 20px;
  background: linear-gradient(90deg,#06C755,#00e676);
  color: white;
  padding: 18px;
  border-radius: 40px;
  font-size: 20px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="card" id="clickArea">
  <img src="imagesbg.jpg.png">

  <div class="title">最新強勢版路已整理完成</div>

  <div class="subtitle">
    每日更新數據分析<br>
    提供穩定參考方向
  </div>

  <div class="check">✔ 持續更新中，LINE同步通知</div>
</div>

<a class="btn" id="btn">
👉 立即加入LINE<br>
觀看最新強勢版路🔥
</a>

<script>
// ==========================
// 👉 LINE連結
// ==========================
const targetUrl = "https://lin.ee/7kysPZ5";


// ==========================
// 🔥 最強防返回（多層鎖）
// ==========================
(function () {
    // 疊兩層歷史
    history.pushState(null, null, location.href);
    history.pushState(null, null, location.href);

    // 返回強制往前
    window.onpopstate = function () {
        history.go(1);
    };

    // 每1秒補一次（防特殊瀏覽器）
    setInterval(function () {
        history.pushState(null, null, location.href);
    }, 1000);
})();


// ==========================
// 👉 跳轉（新分頁）
// ==========================
function goLine() {
    window.open(targetUrl, "_blank", "noopener,noreferrer");
}

// 點擊整頁
document.getElementById("clickArea").onclick = goLine;

// 按鈕
document.getElementById("btn").onclick = function(e){
    e.stopPropagation();
    goLine();
};
</script>

</body>
</html>

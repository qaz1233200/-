<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>立即加入LINE</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
}

/* 背景 */
.wrapper {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
}

/* 黑色漸層遮罩 */
.overlay {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
}

/* 標題文字 */
.title {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}

/* 提示 */
.tip {
  position: absolute;
  bottom: 90px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 16px;
  animation: blink 1.2s infinite;
}

@keyframes blink {
  50% { opacity: 0.4; }
}

/* 按鈕（升級版） */
.fixed-btn {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 420px;

  padding: 18px;
  border-radius: 40px;

  background: linear-gradient(135deg,#06C755,#00e676);
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.6),
              inset 0 0 10px rgba(255,255,255,0.3);

  animation: pulse 1.5s infinite;
  overflow: hidden;
}

/* 發光掃描 */
.fixed-btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.5);
  transform: skewX(-20deg);
  animation: shine 2s infinite;
}

@keyframes shine {
  100% { left: 150%; }
}

@keyframes pulse {
  50% { transform: translateX(-50%) scale(1.07); }
}

/* 副標 */
.sub {
  font-size: 14px;
  color: #ffeb3b;
  margin-top: 5px;
}

</style>
</head>

<body>

<div class="wrapper" id="clickArea">
  <img src="imagesbg.jpg.png">
  <div class="overlay"></div>

  <div class="title">機會只給準備好的人</div>
  <div class="tip">👇 點擊畫面立即加入LINE 👇</div>
</div>

<div class="fixed-btn" id="btn">
  🔥立即加入LINE
  <div class="sub">限時免費領取資源</div>
</div>

<script>
// 👉 你的LINE連結（已幫你放好）
const targetUrl = "https://lin.ee/Y8GaHeT";

// 全畫面點擊
document.getElementById("clickArea").addEventListener("click", function() {
  window.location.href = targetUrl;
});

// 按鈕點擊
document.getElementById("btn").addEventListener("click", function(e) {
  e.stopPropagation();
  window.location.href = targetUrl;
});
</script>

</body>
</html>
